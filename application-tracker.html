<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- JSZip for creating ZIP files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCQqXPSVKQ--g2EFzQ_1eLBxMo_pV5o7NQ",
            authDomain: "job-application-tracker-38407.firebaseapp.com",
            projectId: "job-application-tracker-38407",
            storageBucket: "job-application-tracker-38407.firebasestorage.app",
            messagingSenderId: "917048657393",
            appId: "1:917048657393:web:87efc97c88f794bcd43050"
        };

        // Promise-based ready signal — resolves the instant Firebase is up
        window.firebaseReadyPromise = new Promise(resolve => { window._resolveFirebase = resolve; });

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        // Expose all Firestore functions once — no more per-call dynamic imports
        window.firestoreFns = { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, setDoc, getDoc };
        window.firebaseReady = true;
        window._resolveFirebase();
        console.log('✓ Firebase initialized');
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f1419;
            min-height: 100vh;
            padding: 24px;
            color: #1a1a1a;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #f5f5f5;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1rem;
            color: #94a3b8;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
            padding: 40px;
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .form-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9375rem;
            color: #374151;
            background: #fafafa;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .autocomplete-wrapper {
            position: relative;
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e5e7eb;
            border-top: none;
            border-radius: 0 0 6px 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .autocomplete-list.show {
            display: block;
        }

        .autocomplete-item {

        }

        .autocomplete-item:hover {
            background: #f3f4f6;
        }

        .btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;

        .btn:hover {
            background: #4f46e5;

            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-export {
            background: #059669;
            width: auto;
            padding: 12px 24px;
            font-size: 0.9375rem;
        }

        .btn-export:hover {
            background: #047857;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.8125rem;

        }

        .btn-delete:hover {
            color: #dc2626;
            text-decoration: underline;
        }

        .applications-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;

            font-size: 0.8125rem;

        .applications-table tr:hover {

        .status-badge {

        .status-applied { background: #dbeafe; color: #1e40af; }
        .status-interview { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-offer { background: #fef3c7; color: #92400e; }

        }

        .success-message.show {

        .error-message {

            border-radius: 6px;

        .history-header {

        }

        .history-header .form-group {

        .history-filters {

        .modal-overlay.show {

        .modal {
            background: white;
            border-radius: 8px;

            width: 90%;

            display: flex;

            padding: 16px 20px;

        }

        .modal-header h3 {

            border: none;

            cursor: pointer;

            padding: 4px 8px;
        }

        }

        .modal-body {
            padding: 20px;

            font-size: 0.8125rem;
            color: #374151;

        .jd-view-link {

        .jd-view-link:hover {

        }

        .field-error {

            object-fit: cover;

            cursor: pointer;
            border: 1px solid #e5e7eb;
        }

        .screenshot-thumb:hover {

        @media (max-width: 640px) {

                grid-template-columns: 1fr;

<body>
    <div class="container">
        <div class="header">
            <h1>Job Application Tracker</h1>
            <p>Track your job applications across candidates</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('add')">Add Application</button>
                <button class="tab" onclick="showTab('history')">View History</button>
            </div>

            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <!-- Add Application Tab -->
            <div id="addTab" class="tab-content active">
                <div class="form-row">
                    <div class="form-group" id="fg-candidateName">
                        <label>Candidate Name<span class="mandatory-star">*</span></label>
                        <div class="autocomplete-wrapper">
                            <input type="text" id="candidateName" placeholder="Enter or select candidate" 
                                   oninput="filterAutocomplete('candidateName','candidateList','candidates')" 
                                   onfocus="showAutocompleteList('candidateName','candidateList','candidates')">
                            <div class="autocomplete-list" id="candidateList"></div>
                        </div>
                    </div>
                    <div class="form-group" id="fg-company">
                        <label>Company<span class="mandatory-star">*</span></label>
                        <div class="autocomplete-wrapper">
                            <input type="text" id="company" placeholder="e.g., Google" 
                                   oninput="filterAutocomplete('company','companyList','companies')" 
                                   onfocus="showAutocompleteList('company','companyList','companies')">
                            <div class="autocomplete-list" id="companyList"></div>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" id="fg-jobTitle">
                        <label>Job Title<span class="mandatory-star">*</span></label>
                        <div class="autocomplete-wrapper">
                            <input type="text" id="jobTitle" placeholder="e.g., Software Engineer" 
                                   oninput="filterAutocomplete('jobTitle','jobTitleList','jobTitles')" 
                                   onfocus="showAutocompleteList('jobTitle','jobTitleList','jobTitles')">
                            <div class="autocomplete-list" id="jobTitleList"></div>
                        </div>
                    </div>
                    <div class="form-group" id="fg-whoApplied">
                        <label>Who Applied<span class="mandatory-star">*</span></label>
                        <select id="whoApplied" onchange="handleWhoAppliedChange()">
                            <option value="">Select person</option>
                            <option value="__new__">+ Add New Person</option>
                        </select>
                        <input type="text" id="newPersonName" placeholder="Enter name..." style="display: none; margin-top: 8px;">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" id="fg-dateApplied">
                        <label>Date Applied<span class="mandatory-star">*</span></label>
                        <input type="date" id="dateApplied">
                    </div>
                    <div class="form-group" id="fg-jdLink">
                        <label>JD Link<span class="mandatory-star">*</span></label>
                        <input type="text" id="jdLink" placeholder="https://...">
                    </div>
                    <div class="form-group" id="fg-atsScore">
                        <label>ATS Score (%)</label>
                        <input type="number" id="atsScore" placeholder="e.g., 85" min="0" max="100">
                    </div>
                </div>

                <div class="form-group" id="fg-jobDescription">
                    <label>Job Description<span class="mandatory-star">*</span></label>
                    <textarea id="jobDescription" rows="4" placeholder="Paste the job description here..." style="resize: vertical;"></textarea>
                </div>

                <div class="form-group" id="fg-resume">
                    <label>Resume<span class="mandatory-star">*</span></label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button type="button" onclick="document.getElementById('resumeFile').click()" 
                                style="padding: 10px 16px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; font-size: 0.875rem; color: #374151; white-space: nowrap;">
                            Choose File
                        </button>
                        <input type="file" id="resumeFile" accept=".pdf,.docx,.doc" onchange="handleResumeUpload(event)" style="display: none;">
                        <span id="resumeDisplay" style="font-size: 0.875rem; color: #6b7280;">No file chosen</span>
                    </div>
                </div>

                <div class="form-group" id="fg-screenshot">
                    <label>Application Screenshot<span class="mandatory-star">*</span></label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button type="button" onclick="document.getElementById('screenshotFile').click()" 
                                style="padding: 10px 16px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; font-size: 0.875rem; color: #374151; white-space: nowrap;">
                            Choose Image
                        </button>
                        <input type="file" id="screenshotFile" accept=".png,.jpg,.jpeg,.gif,.webp" onchange="handleScreenshotUpload(event)" style="display: none;">
                        <span id="screenshotDisplay" style="font-size: 0.875rem; color: #6b7280;">No image chosen</span>
                    </div>
                    <img id="screenshotPreview" style="display:none; margin-top:8px; max-width:200px; max-height:120px; border-radius:6px; border:1px solid #e5e7eb;">
                </div>

                <button class="btn" id="saveBtn" onclick="saveApplication()">Save Application</button>
            </div>

            <!-- History Tab -->
            <div id="historyTab" class="tab-content">
                <div class="history-header">
                    <div class="history-filters">
                        <div class="form-group">
                            <label>Candidate</label>
                            <select id="filterCandidate" onchange="renderApplications()">
                                <option value="">All</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Date Applied</label>
                            <input type="date" id="filterDate" onchange="renderApplications()">
                        </div>
                        <div class="form-group" style="display:flex;align-items:flex-end;">
                            <button onclick="clearFilters()" style="padding:10px 14px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;font-size:0.875rem;color:#374151;">Clear Filters</button>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                        <span class="count-badge" id="appCount">0</span>
                        <button class="btn btn-bulk-delete" id="bulkDeleteBtn" onclick="bulkDeleteApplications()" style="display:none;">🗑 Delete Selected (0)</button>
                        <button class="btn btn-export" onclick="refreshData()" style="background: #6366f1; padding: 12px 20px;">🔄 Refresh</button>
                        <button class="btn btn-export" onclick="downloadExcel()">📥 Export to ZIP</button>
                    </div>
                </div>

                <div id="applicationsContainer">
                    <div class="empty-state">No applications yet. Add your first one!</div>
                </div>
            </div>
        </div>
    </div>

    <!-- JD Modal -->
    <div class="modal-overlay" id="jdModal" onclick="if(event.target===this)closeJdModal()">
        <div class="modal">
            <div class="modal-header">
                <h3 id="jdModalTitle">Job Description</h3>
                <button class="modal-close" onclick="closeJdModal()">&times;</button>
            </div>
            <div class="modal-body" id="jdModalBody"></div>
        </div>
    </div>

    <script>
        // ============================================
        // Firebase Firestore Storage (shared cloud storage)
        // ============================================
        const COLLECTION_NAME = 'applications';
        
        // Cache to prevent excessive reads
        let applicationsCache = null;
        let cacheTimestamp = null;
        const CACHE_DURATION = 30000; // 30 seconds
        let uniqueValuesCache = {};

        async function waitForFirebase() {
            // Use Promise if available (fast path), fall back to polling
            if (window.firebaseReadyPromise) {
                await window.firebaseReadyPromise;
            } else {
                while (!window.firebaseReady) {
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
            }
        }

        async function getApplications(forceRefresh = false) {
            await waitForFirebase();
            
            // Return cached data if available and fresh
            const now = Date.now();
            if (!forceRefresh && applicationsCache && cacheTimestamp && (now - cacheTimestamp < CACHE_DURATION)) {
                console.log('📦 Using cached data (preventing Firebase read)');
                return applicationsCache;
            }
            
            console.log('🔄 Fetching from Firebase...');
            // Use pre-imported functions — no per-call dynamic import overhead
            const { collection, getDocs, query, orderBy } = window.firestoreFns;
            const q = query(collection(window.db, COLLECTION_NAME), orderBy('dateApplied', 'desc'));
            const snapshot = await getDocs(q);
            applicationsCache = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
            cacheTimestamp = now;
            return applicationsCache;
        }
        
        // Clear cache when data changes
        function clearCache() {
            applicationsCache = null;
            cacheTimestamp = null;
            uniqueValuesCache = {};
        }

        async function addApplication(app) {
            await waitForFirebase();
            const { collection, addDoc, doc, setDoc } = window.firestoreFns;
            // Split binary data out of main doc — keeps main docs tiny so history loads fast
            const { resumeBase64, screenshotBase64, ...metadata } = app;
            const docRef = await addDoc(collection(window.db, COLLECTION_NAME), metadata);
            // Store binary files in a subcollection doc, fetched on-demand only
            if (resumeBase64 || screenshotBase64) {
                await setDoc(doc(window.db, COLLECTION_NAME, docRef.id, 'files', 'data'), {
                    resumeBase64: resumeBase64 || '',
                    screenshotBase64: screenshotBase64 || ''
                });
            }
            clearCache();
        }

        async function updateApplication(app) {
            await waitForFirebase();
            const { doc, updateDoc } = window.firestoreFns;
            const docRef = doc(window.db, COLLECTION_NAME, app.id);
            // Exclude id and binary blobs from main doc update
            const { id, resumeBase64, screenshotBase64, ...data } = app;
            await updateDoc(docRef, data);
            clearCache();
        }

        async function removeApplication(id) {
            await waitForFirebase();
            const { doc, deleteDoc } = window.firestoreFns;
            // Delete files subcollection doc first (best-effort, may not exist for old records)
            try { await deleteDoc(doc(window.db, COLLECTION_NAME, id, 'files', 'data')); } catch(e) {}
            await deleteDoc(doc(window.db, COLLECTION_NAME, id));
            clearCache();
        }

        async function getUniqueValues(field) {
            if (uniqueValuesCache[field]) return uniqueValuesCache[field];
            const apps = await getApplications();
            uniqueValuesCache[field] = [...new Set(apps.map(a => a[field]).filter(Boolean))].sort();
            return uniqueValuesCache[field];
        }

        // ============================================
        // Autocomplete helpers (generic, async)
        // ============================================
        const fieldMap = {
            candidates: 'candidate',
            companies: 'company',
            jobTitles: 'jobTitle'
        };

        async function filterAutocomplete(inputId, listId, sourceKey) {
            const input = document.getElementById(inputId).value.toLowerCase();
            const list = document.getElementById(listId);

            if (!input) {
                list.classList.remove('show');
                return;
            }

            const items = await getUniqueValues(fieldMap[sourceKey]);
            const filtered = items.filter(c => c.toLowerCase().includes(input));
            if (filtered.length > 0) {
                list.innerHTML = filtered.map(c =>
                    `<div class="autocomplete-item" onclick="selectAutocomplete('${inputId}','${listId}','${c.replace(/'/g, "\\'")}')">${c}</div>`
                ).join('');
                list.classList.add('show');
            } else {
                list.classList.remove('show');
            }
        }

        async function showAutocompleteList(inputId, listId, sourceKey) {
            const items = await getUniqueValues(fieldMap[sourceKey]);
            const list = document.getElementById(listId);
            if (items.length > 0) {
                list.innerHTML = items.map(c =>
                    `<div class="autocomplete-item" onclick="selectAutocomplete('${inputId}','${listId}','${c.replace(/'/g, "\\'")}')">${c}</div>`
                ).join('');
                list.classList.add('show');
            }
        }

        async function downloadResume(appId) {
            const apps = await getApplications();
            const app = apps.find(a => a.id === appId);
            if (!app) { alert('Application not found'); return; }

            let resumeBase64 = app.resumeBase64; // old records have it here
            const resumeType = app.resumeType || 'application/pdf';
            const resumeFileName = app.resumeFileName || 'resume.pdf';

            // New records: base64 lives in the files subcollection — fetch on demand
            if (!resumeBase64) {
                const { doc, getDoc } = window.firestoreFns;
                const filesSnap = await getDoc(doc(window.db, COLLECTION_NAME, appId, 'files', 'data'));
                if (filesSnap.exists()) resumeBase64 = filesSnap.data().resumeBase64;
            }

            if (!resumeBase64) { alert('Resume not available'); return; }

            try {
                const binary = atob(resumeBase64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const blob = new Blob([bytes], { type: resumeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = resumeFileName;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                console.error('Failed to download resume:', e);
                alert('Failed to download resume');
            }
        }

            const whoApplied = getWhoApplied();

            if (!company) { showFieldError('fg-company', 'Company is required'); hasErrors = true; }
            if (!jobTitle) { showFieldError('fg-jobTitle', 'Job Title is required'); hasErrors = true; }
            if (!whoApplied) { showFieldError('fg-whoApplied', 'Please select or enter who applied'); hasErrors = true; }

            try {
                const atsScoreRaw = document.getElementById('atsScore').value;
                const atsScore = atsScoreRaw !== '' ? Number(atsScoreRaw) : null;

                const entry = {
                    candidate,
                    company,
                    jobTitle,

                    jobDescription,

        function updateBulkDeleteBtn() {

            const selectAll = document.getElementById('selectAll');

            }

            if (selectAll) {
                if (checkboxes.length > 0 && checked.length === checkboxes.length) {
                    selectAll.checked = true;
                    selectAll.indeterminate = false;
                } else if (checked.length > 0) {
                    selectAll.checked = false;

                    selectAll.indeterminate = false;

        // ============================================

        // ============================================
        async function downloadExcel() {
            // Use filtered applications instead of all applications
            const apps = await getFilteredApplications();
            if (apps.length === 0) {
                showError('No applications to export (check your filters)');
                return;
            }

            const timestamp = new Date().toISOString().split('T')[0];
            const folderName = `Job_Applications_${timestamp}`;

            // Show loading message
            showSuccess('Creating ZIP file... Please wait');

            // Create a new JSZip instance
            const zip = new JSZip();

            // New-style records have base64 in a subcollection — fetch them all in parallel
            const needsFetch = apps.filter(a => !a.resumeBase64 && !a.screenshotBase64 && (a.resumeFileName || a.screenshotFileName));
            const filesMap = {};
            if (needsFetch.length > 0) {
                showSuccess(`Fetching ${needsFetch.length} file(s) for export\u2026 Please wait`);
                const { doc, getDoc } = window.firestoreFns;
                const results = await Promise.all(
                    needsFetch.map(a =>
                        getDoc(doc(window.db, COLLECTION_NAME, a.id, 'files', 'data'))
                            .then(snap => ({ id: a.id, data: snap.exists() ? snap.data() : {} }))
                            .catch(() => ({ id: a.id, data: {} }))
                    )
                );
                results.forEach(r => { filesMap[r.id] = r.data; });
            }

            // Process all resumes and add them to ZIP
            const resumeFiles = [];
            for (const app of apps) {
                const resumeBase64 = app.resumeBase64 || (filesMap[app.id] && filesMap[app.id].resumeBase64);
                if (resumeBase64 && app.resumeFileName) {
                    try {
                        const binary = atob(resumeBase64);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) {
                            bytes[i] = binary.charCodeAt(i);
                        }
                        
                        const uniqueFileName = `${app.id}_${app.candidate}_${app.company}_${app.resumeFileName}`.replace(/[^a-zA-Z0-9._-]/g, '_');
                        
                        zip.folder("Resumes").file(uniqueFileName, bytes);
                        resumeFiles.push({ name: uniqueFileName, appId: app.id });

                }
            }

            // Create CSV with simple data
            const headers = ['Candidate', 'Company', 'Job Title', 'Applied By', 'Date Applied', 'ATS Score (%)', 'Resume File Path', 'Screenshot File Path', 'JD Link', 'Job Description', 'Status'];
            const rows = apps.map(a => {

                }
                
                return [

                    csvEscape(screenshotPath || 'N/A'),
                    csvEscape(a.jdLink || ''),
                    csvEscape(a.jobDescription || ''),
                    csvEscape(a.status || '')
                ];
            });

            // Build CSV content
            let csv = '\uFEFF' + headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.join(',') + '\n';
            });

            // Add CSV file to ZIP root
            zip.file(`${folderName}.csv`, csv);

            // Generate ZIP file
            try {
                const zipBlob = await zip.generateAsync({ 
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                });

                // Download the ZIP file
                const url = URL.createObjectURL(zipBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${folderName}.zip`;
                link.click();
                URL.revokeObjectURL(url);

                // Check if filters are active
                const isFiltered = document.getElementById('filterCandidate').value || 
                                   document.getElementById('filterDate').value;
                const filterText = isFiltered ? ' (filtered)' : '';
                showSuccess(`✓ Downloaded ${folderName}.zip with ${apps.length} application${apps.length !== 1 ? 's' : ''}${filterText}, ${resumeFiles.length} resume${resumeFiles.length !== 1 ? 's' : ''}, and ${screenshotFiles.length} screenshot${screenshotFiles.length !== 1 ? 's' : ''}!`);
            } catch (e) {
                console.error('Failed to create ZIP:', e);
                showError('Failed to create ZIP file. Please try again.');
            }
        }

        function csvEscape(val) {
            if (!val) return '';
            val = String(val);
            if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                return '"' + val.replace(/"/g, '""') + '"';
            }
            return val;
        }

        

        // ============================================
        // Messages
        // ============================================
        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        // ============================================
        // Init
        // ============================================
        document.addEventListener('DOMContentLoaded', async function() {
            document.getElementById('dateApplied').value = new Date().toISOString().split('T')[0];
            await populateWhoApplied();
        });
    </script>
</body>
</html>
